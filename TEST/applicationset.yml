apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: httpd-nginx-multicluster
  namespace: argocd
spec:
  generators:
  - clusters: {}

  template:
    metadata:
      name: '{{name}}-httpd-nginx'
    spec:
      project: default

      source:
        repoURL: https://github.com/upadhyaysaab/anmol.git
        targetRevision: HEAD
        path: TEST/APPS
        directory:
          recurse: true

      destination:
        server: '{{server}}'
        namespace: default

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
